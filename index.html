<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dcon | Confidence + CA Prep Copilot</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>Dcon</h1>
        <p class="subtitle">Psychological support + India CA prep copilot (local, private, low-cost)</p>
      </header>

      <section class="notice">
        <strong>Safety:</strong> Dcon is a reflective support and study assistant, not medical diagnosis.
        If there is immediate danger, contact local emergency services.
      </section>

      <section class="checkin">
        <h2>Quick check-in</h2>
        <div class="checkin-grid">
          <label>Sleep (1-10)<input id="sleep" type="number" min="1" max="10" value="5" /></label>
          <label>Stress (1-10)<input id="stress" type="number" min="1" max="10" value="5" /></label>
          <label>Confidence (1-10)<input id="confidence" type="number" min="1" max="10" value="5" /></label>
          <label>Focus (1-10)<input id="focus" type="number" min="1" max="10" value="5" /></label>
        </div>
      </section>

      <section class="toolbar">
        <button id="prompt-plan" type="button">Create weekly CA timetable</button>
        <button id="prompt-revision" type="button">Make quick revision sheet</button>
        <button id="show-resources" type="button">Show verified CA resources</button>
      </section>

      <section id="chat" class="chat" aria-live="polite"></section>

      <form id="composer" class="composer">
        <textarea id="message" placeholder="Type how you're feeling or what you need for CA prep..." rows="3" required></textarea>
        <div class="controls">
          <label>
            Local model (default)
            <input id="model" type="text" value="llama3.1:8b" />
          </label>
          <button type="submit">Send</button>
        </div>
      </form>
    </main>

    <script src="app.js"></script>
  </body>
</html>

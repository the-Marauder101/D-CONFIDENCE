<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D-CONFIDENCE | Reflective Support Chat</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>D-CONFIDENCE</h1>
        <p class="subtitle">Private reflective support chat (local model, low cost)</p>
      </header>

      <section class="notice">
        <strong>Safety:</strong> This tool is for reflection and emotional support, not medical diagnosis.
        If there is immediate danger, contact local emergency services.
      </section>

      <section class="checkin">
        <h2>Quick check-in</h2>
        <div class="checkin-grid">
          <label>Sleep (1-10)<input id="sleep" type="number" min="1" max="10" value="5" /></label>
          <label>Stress (1-10)<input id="stress" type="number" min="1" max="10" value="5" /></label>
          <label>Confidence (1-10)<input id="confidence" type="number" min="1" max="10" value="5" /></label>
          <label>Focus (1-10)<input id="focus" type="number" min="1" max="10" value="5" /></label>
        </div>
      </section>

      <section id="chat" class="chat" aria-live="polite"></section>

      <form id="composer" class="composer">
        <textarea
          id="message"
          placeholder="Type how you're feeling..."
          rows="3"
          required
        ></textarea>
        <div class="controls">
          <label>
            Ollama model
            <input id="model" type="text" value="llama3.1:8b" />
          </label>
          <button type="submit">Send</button>
        </div>
      </form>
    </main>

    <script src="app.js"></script>
  </body>
</html>
